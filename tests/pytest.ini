[pytest]
# Test discovery
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# Markers for organizing tests
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (requires external services)
    slow: Slow running tests
    requires_db: Tests requiring PostgreSQL database connection
    encryption: Encryption-specific tests
    steganography: Steganography-specific tests

# Logging
log_cli = true
log_cli_level = INFO
log_file = tests.log